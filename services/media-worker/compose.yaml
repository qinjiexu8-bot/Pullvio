services:
  pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:1.3.1-deno@sha256:bea3cfda79245700d7ad90500052b4358b1c1828fdc0961929624b83933121bc
    container_name: pullvio-pot-provider
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,mode=1777
    expose:
      - "4416"
    mem_limit: 512m
    cpus: 0.5
    networks:
      media-internal:
        ipv4_address: 172.30.240.2
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: pullvio/media-worker:2026-07-18-multi-asset
    container_name: pullvio-media-worker
    depends_on:
      - pot-provider
    restart: unless-stopped
    read_only: true
    user: "997:988"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,mode=1777
    volumes:
      - /var/lib/pullvio/tmp:/work
    environment:
      AWS_REGION: us-east-1
      PULLVIO_SQS_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/856021349535/pullvio-media-jobs
      PULLVIO_S3_BUCKET: pullvio
      PULLVIO_SUPABASE_SECRET_ARN: arn:aws:secretsmanager:us-east-1:856021349535:secret:pullvio/supabase/worker-GrpN9z
      PULLVIO_TMP_ROOT: /work
      PULLVIO_MAX_DURATION_SECONDS: "7200"
      PULLVIO_MAX_OUTPUT_BYTES: "2147483648"
      PULLVIO_COMMAND_TIMEOUT_SECONDS: "1800"
      PULLVIO_LEASE_SECONDS: "180"
      PULLVIO_POT_PROVIDER_URL: http://pot-provider:4416
      PULLVIO_YOUTUBE_PLAYER_CLIENT: mweb
      PULLVIO_SOURCE_MIN_INTERVAL_SECONDS: "10"
      PULLVIO_YTDLP_SLEEP_REQUESTS_SECONDS: "1"
      PULLVIO_YTDLP_SLEEP_INTERVAL_SECONDS: "8"
      PULLVIO_YTDLP_MAX_SLEEP_INTERVAL_SECONDS: "15"
    mem_limit: 3g
    cpus: 2.0
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 20m
        max-file: "5"
    networks:
      media-internal:
        ipv4_address: 172.30.240.3

networks:
  media-internal:
    name: pullvio-media-internal
    ipam:
      config:
        - subnet: 172.30.240.0/28
